# Servera PWA-frontend (statisk build) + proxy /api till uvicorn.
# Kopiera till /etc/nginx/sites-available/momentum och länka till sites-enabled.
#
# HTTPS krävs för att PWA:n ska gå att installera och för att service workern
# ska aktiveras utanför localhost – använd t.ex. certbot för ett riktigt
# certifikat, eller en self-signed cert för enbart internt bruk.

server {
    listen 80;
    server_name _;

    root /opt/momentum/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /index.html;
    }
}
