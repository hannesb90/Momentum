# Servera PWA-frontend (statisk build) + proxy /api till uvicorn.
# Kopiera till /etc/nginx/sites-available/momentum och länka till sites-enabled.
#
# HTTPS krävs för att PWA:n ska gå att installera och för att service workern
# ska aktiveras utanför localhost – använd t.ex. certbot för ett riktigt
# certifikat, eller en self-signed cert för enbart internt bruk.

server {
    listen 80;
    # 5174 spegling av port 80: Tailscale ACL på detta tailnet tillåter
    # historiskt bara specifika portar mellan enheterna (5174/8080 har
    # testats och fungerat, port 80 har inte) - lyssna även på 5174 som
    # work-around tills ACL-policyn uppdaterats för att tillåta :80.
    listen 5174;
    server_name _;

    root /opt/momentum/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri /index.html;
    }
}
